<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=0" />
  <title>Alvin (Choutenshi) Abdul - Personal Site</title>
  
  <style>
    :root {
      --bg: #050505;
      --glass: rgba(10, 10, 12, 0.85);
      --border: rgba(255, 255, 255, 0.1);
      --text: #ffe4ec;
      --muted: #ffb6c1;
      --accent: #ff8da0;
      --accent-glow: rgba(255, 141, 160, 0.6);
      --font: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      user-select: none;
      -webkit-tap-highlight-color: transparent; /* N-no blue box when tapping on mobile! */
    }

    /* T-the 10x faster CRT flicker! */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9;
      background: radial-gradient(circle at center, rgba(255,141,160,0.08) 0%, rgba(0,0,0,0.2) 70%, rgba(0,0,0,0.55) 100%);
      mix-blend-mode: screen;
      animation: crt-flicker 0.15s infinite; 
    }

    @keyframes crt-flicker {
      0% { opacity: 0.96; }
      50% { opacity: 1; }
      100% { opacity: 0.94; }
    }

    /* T-the background layer that will move 'kaku' style! */
    #bg-layer {
      position: fixed;
      top: -15%;
      left: -15%;
      width: 130%;
      height: 130%;
      background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                  url('https://i.pinimg.com/originals/5c/a5/79/5ca579ef2ba2e2f33618822bf0b08480.gif') center/cover no-repeat;
      z-index: 0;
      will-change: transform;
    }

    #overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: #050505;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 5px;
      font-size: 12px;
      text-align: center;
      padding: 20px;
    }

    /* T-the fast CRT flash effect you wanted! */
    .crt-flash-effect {
      animation: crt-snap 0.15s forwards;
    }

    @keyframes crt-snap {
      0% { filter: brightness(10); background: white; }
      100% { filter: none; background: transparent; }
    }

    #matrix-canvas {
      position: fixed;
      inset: 0;
      z-index: 1;
      opacity: 0.15;
    }

    /* T-the terminal box... s-staying perfectly still now! */
    .terminal {
      position: relative;
      width: min(850px, 92vw);
      max-height: 85vh;
      overflow-y: auto;
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 15px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 20px;
      z-index: 5;
      visibility: hidden;
    }

    .terminal.visible { visibility: visible; }

    /* M-making text smaller for phones... */
    @media (max-width: 600px) {
      #terminal-body { font-size: 12px; }
      .header { font-size: 11px; }
      .chip { font-size: 10px; padding: 4px 8px; }
      .footer { font-size: 9px; }
    }

    .header {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 15px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    #terminal-body { line-height: 1.6; white-space: pre-wrap; }
    .prompt { color: var(--accent); }
    
    a { color: var(--text); text-decoration: none; border-bottom: 1px dotted var(--muted); }

    .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 20px; opacity: 0; }
    .chip { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border); border-radius: 10px; color: var(--muted); }

    .cursor::after { content: '▋'; color: var(--accent); animation: blink 1s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    .fade-in { opacity: 1 !important; transition: opacity 1s; }
    .line { margin-bottom: 4px; }

    .permission-btn {
      margin-top: 20px;
      padding: 10px;
      border: 1px solid var(--accent);
      background: transparent;
      color: var(--accent);
      font-family: var(--font);
      cursor: pointer;
      font-size: 10px;
    }
  </style>
</head>
<body>

  <div id="overlay">
    <div>Connect to the Wired</div>
    <button class="permission-btn" id="accel-btn" style="display:none;">[ Enable Sensors ]</button>
  </div>

  <div id="bg-layer"></div>
  <canvas id="matrix-canvas"></canvas>
  <audio id="bg-music" loop><source src="/images/lain.mp3" type="audio/mpeg"></audio>

  <div class="terminal" id="main-terminal">
    <div class="header">Alvin "Izayoi" Abdul · Choutenshi</div>
    <div id="terminal-body"></div>
    <div class="chips" id="chips-area">
      <div class="chip">programmer</div><div class="chip">pianist</div><div class="chip">singer</div>
      <div class="chip">author</div><div class="chip">polyglot</div><div class="chip">chess gm</div>
    </div>
    <div class="footer" id="footer-area" style="opacity:0; margin-top:20px; font-size:10px; color:rgba(255,255,255,0.3);">
      maybe it's a dream, maybe nothing else is real.. but it wouldn't mean a thing if I told you how I feel...
    </div>
  </div>

  <script>
    const overlay = document.getElementById('overlay');
    const music = document.getElementById('bg-music');
    const bg = document.getElementById('bg-layer');
    const terminal = document.getElementById('main-terminal');
    const accelBtn = document.getElementById('accel-btn');

    // T-this part checks if we are on an iPhone to ask for permission!
    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
      accelBtn.style.display = 'block';
    }

    function startEverything() {
      music.play();
      document.body.classList.add('crt-flash-effect');
      overlay.style.opacity = '0';
      setTimeout(() => {
        overlay.style.display = 'none';
        terminal.classList.add('visible');
        typeWriter();
      }, 150);
    }

    overlay.addEventListener('click', (e) => {
      if(e.target.id === 'accel-btn') {
        DeviceOrientationEvent.requestPermission().then(response => {
          if (response == 'granted') {
            window.addEventListener('deviceorientation', handleOrientation);
          }
          startEverything();
        });
      } else {
        startEverything();
      }
    });

    // O-okay, this is the "kaku" parallax for the background!
    function applyStiffMovement(x, y) {
      const step = 8; // M-made it even blockier!
      const stiffX = Math.round(x / step) * step;
      const stiffY = Math.round(y / step) * step;
      bg.style.transform = `translate3d(${stiffX}px, ${stiffY}px, 0)`;
    }

    // F-for desktop mice...
    document.addEventListener('mousemove', (e) => {
      const moveX = (e.clientX - window.innerWidth / 2) * 0.05;
      const moveY = (e.clientY - window.innerHeight / 2) * 0.05;
      applyStiffMovement(-moveX, -moveY);
    });

    // F-for mobile tilting!
    function handleOrientation(event) {
      const x = event.gamma * 2; // Left/Right tilt
      const y = event.beta * 2;  // Front/Back tilt
      applyStiffMovement(x, y);
    }
    window.addEventListener('deviceorientation', handleOrientation);

    // M-matrix rain logic (kept the same)...
    const canvas = document.getElementById('matrix-canvas');
    const ctx = canvas.getContext('2d');
    let width, height, columns, drops;
    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
      columns = Math.floor(width / 20);
      drops = Array(columns).fill(0);
    }
    window.addEventListener('resize', resize);
    resize();
    function drawMatrix() {
      ctx.fillStyle = 'rgba(5,5,5,0.15)';
      ctx.fillRect(0, 0, width, height);
      ctx.fillStyle = '#ff8da0';
      ctx.font = '12px monospace';
      for (let i = 0; i < drops.length; i++) {
        if (Math.random() > 0.98) ctx.fillText(Math.floor(Math.random() * 2), i * 20, drops[i] * 20);
        if (drops[i] * 20 > height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
      }
      requestAnimationFrame(drawMatrix);
    }
    drawMatrix();

    // T-typing logic (kept the same)...
    const commands = [
      { type: 'cmd', text: 'whoami' },
      { type: 'text', text: 'name: Alvin "Izayoi" Abdul' },
      { type: 'text', text: 'status: high school student' },
      { type: 'br' },
      { type: 'cmd', text: 'cat links.txt' },
      { type: 'link', url: 'https://github.com/choutenshi' },
      { type: 'link', url: 'https://discord.gg/WNNrdNFztG' }
    ];
    let cmdIndex = 0;
    function typeWriter() {
      if (cmdIndex >= commands.length) {
        document.getElementById('chips-area').classList.add('fade-in');
        document.getElementById('footer-area').classList.add('fade-in');
        return;
      }
      const item = commands[cmdIndex];
      const div = document.createElement('div');
      div.className = 'line';
      if (item.type === 'cmd') div.innerHTML = '<span class="prompt">$ </span>';
      document.getElementById('terminal-body').appendChild(div);
      if (item.type === 'br') { cmdIndex++; setTimeout(typeWriter, 40); return; }
      let content = item.type === 'link' ? item.url : item.text;
      let charIndex = 0;
      let target = div;
      if (item.type === 'link') {
        const a = document.createElement('a'); a.href = item.url; a.target = "_blank";
        div.appendChild(a); target = a;
      }
      div.classList.add('cursor');
      function type() {
        if (charIndex < content.length) {
          target.textContent += content[charIndex++];
          setTimeout(type, Math.random() * 30 + 10);
        } else {
          div.classList.remove('cursor');
          cmdIndex++;
          setTimeout(typeWriter, 50);
        }
      }
      type();
    }
  </script>
</body>
</html>
